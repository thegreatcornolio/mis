<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilogy · MIS · Daily Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --navy:#1e1e1e; --navy2:#2a2a2a; --green:#4AFD0E; --green-light:#edffd6;
      --green-dark:#2a8a00; --offwhite:#F7F6F2; --border:#e2e1dd; --border2:#c8c7c3;
      --surface:#fff; --bg:#e8e7e3; --text:#1B2A4A; --text2:#4A5568; --text3:#7a8499;
      --radius:8px; --radius-lg:12px; --radius-xl:16px;
      --red:#c0392b; --orange:#e67e22; --blue:#2980b9;
    }
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;margin:0;overflow-x:hidden}
    *{box-sizing:border-box}

    /* NAV */
    .nav{background:var(--navy);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100}
    .nav-left{display:flex;align-items:center;gap:12px}
    .nav-divider{width:1px;height:24px;background:rgba(255,255,255,0.15)}
    .nav-section{color:rgba(255,255,255,0.65);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase}
    .nav-back{color:rgba(255,255,255,0.45);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;text-decoration:none;padding:6px 10px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;transition:all 0.15s}
    .nav-back:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid rgba(74,253,14,0.4)}
    .nav-name{color:rgba(255,255,255,0.8);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600}
    .btn-signout{background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.18s}
    .btn-signout:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9)}

    /* HERO */
    .hero{background:var(--navy);padding:32px 0 28px}
    .hero-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
    .hero-left .hero-label{color:var(--green);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;margin-bottom:6px}
    .hero-left .hero-title{color:#fff;font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;line-height:1.15}
    .hero-left .hero-sub{color:rgba(255,255,255,0.38);font-size:13px;margin-top:4px}
    .date-nav{display:flex;align-items:center;gap:8px}
    .date-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);width:34px;height:34px;border-radius:var(--radius);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .date-btn:hover{background:rgba(255,255,255,0.14)}
    .date-input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;padding:7px 12px;border-radius:var(--radius);outline:none;cursor:pointer;height:34px}
    .date-input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.6}

    /* CONTAINER */
    .container{max-width:1200px;margin:0 auto;padding:24px 32px 56px}

    /* KPI CARDS */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px 22px}
    .kpi-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
    .kpi-value{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;color:var(--text);line-height:1}
    .kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
    .kpi-badge{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px}
    .badge-green{background:var(--green-light);color:var(--green-dark)}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-orange{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:var(--red)}
    .badge-grey{background:var(--bg);color:var(--text3)}

    /* TWO COL */
    .two-col{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:20px}
    .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
    .card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .ci-g{background:var(--green-light)} .ci-b{background:#dbeafe} .ci-o{background:#fef3c7} .ci-p{background:#f3e8ff} .ci-r{background:#fee2e2} .ci-t{background:#ccfbf1}
    .card-body{padding:20px}

    /* SENTIMENT BARS */
    .sent-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .sent-row:last-child{margin-bottom:0}
    .sent-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;width:72px;flex-shrink:0}
    .sent-bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
    .sent-bar{height:100%;border-radius:4px;transition:width 0.8s ease}
    .sent-count{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
    .sent-pct{font-size:11px;color:var(--text3);width:36px;flex-shrink:0}

    /* AGENT TABLE */
    .agent-table-wrap{overflow-x:auto}
    .agent-table{width:100%;border-collapse:collapse;font-size:12px}
    .agent-table th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
    .agent-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    .agent-table tr:last-child td{border-bottom:none}
    .agent-table tr:hover td{background:var(--offwhite)}
    .agent-name{font-weight:600;font-size:13px}
    .util-bar-wrap{width:60px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
    .util-bar{height:100%;border-radius:3px;background:var(--green)}
    .missed-badge{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}

    /* DISP LIST */
    .disp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .disp-row:last-child{border-bottom:none}
    .disp-rank{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
    .disp-name{flex:1;font-size:13px;color:var(--text)}
    .disp-bar-wrap{width:80px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
    .disp-bar{height:100%;border-radius:3px;background:var(--blue)}
    .disp-count{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--text);width:30px;text-align:right;flex-shrink:0}

    /* QUEUE STATS */
    .queue-stat{display:flex;flex-direction:column;padding:14px 0;border-bottom:1px solid var(--border)}
    .queue-stat:last-child{border-bottom:none}
    .qs-val{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:var(--text);line-height:1;margin-bottom:3px}
    .qs-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3)}

    /* IMPORT STATUS */
    .import-bar{background:var(--offwhite);border-top:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
    .import-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-green{background:var(--green)}
    .dot-orange{background:var(--orange)}
    .dot-red{background:var(--red)}

    /* EMPTY / ERROR */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text3);text-align:center}
    .empty-ico{font-size:36px;margin-bottom:12px}
    .empty-title{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px}
    .empty-sub{font-size:13px}

    /* LOADING */
    #loading-overlay{position:fixed;inset:0;background:rgba(232,231,227,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:14px}
    .load-spinner{width:36px;height:36px;border:3px solid rgba(30,30,30,0.12);border-top-color:var(--navy);border-radius:50%;animation:spin 0.75s linear infinite}
    .load-txt{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
    @keyframes spin{to{transform:rotate(360deg)}}

    .skel{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    @media(max-width:960px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col,.three-col{grid-template-columns:1fr}}
    @media(max-width:640px){.nav{padding:0 16px}.hero-inner,.container,.import-bar{padding-left:16px;padding-right:16px}.kpi-grid{grid-template-columns:1fr 1fr}.hero-inner{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="load-spinner"></div>
  <div class="load-txt" id="load-txt">Loading dashboard…</div>
</div>

<div id="app" style="display:none">

  <nav class="nav">
    <div class="nav-left">
      <img src="/trilogy-logo.png" alt="Trilogy" style="height:28px">
      <div class="nav-divider"></div>
      <div class="nav-section">MIS Dashboard</div>
      <div class="nav-divider"></div>
      <a class="nav-back" href="../index.html">← Campaigns</a>
    </div>
    <div class="nav-right">
      <div class="nav-avatar" id="nav-av"></div>
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-left">
        <div class="hero-label" id="hero-campaign">NADClinic · Daily Dashboard</div>
        <div class="hero-title">Daily Report</div>
        <div class="hero-sub" id="hero-sub">Loading…</div>
      </div>
      <div class="date-nav">
        <button class="date-btn" onclick="shiftDate(-1)" title="Previous day">‹</button>
        <input class="date-input" type="date" id="date-picker" onchange="onDateChange()">
        <button class="date-btn" onclick="shiftDate(1)" title="Next day">›</button>
      </div>
    </div>
  </div>

  <!-- KPI row -->
  <div class="container">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
    </div>

    <!-- Sentiment + Departments -->
    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-g">😊</div>Sentiment</div>
        </div>
        <div class="card-body" id="sentiment-body">
          <div class="skel" style="height:18px;margin-bottom:10px"></div>
          <div class="skel" style="height:18px;margin-bottom:10px"></div>
          <div class="skel" style="height:18px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-b">🏢</div>Department distribution</div>
        </div>
        <div class="card-body" style="padding:16px 20px">
          <canvas id="dept-chart" height="160"></canvas>
        </div>
      </div>
    </div>

    <!-- Agent scorecard -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title"><div class="card-icon ci-p">👤</div>Agent scorecard</div>
        <span id="agent-count" class="badge-grey" style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--bg);color:var(--text3)">—</span>
      </div>
      <div class="agent-table-wrap">
        <table class="agent-table" id="agent-table">
          <thead>
            <tr>
              <th>Agent</th>
              <th>Total</th>
              <th>In</th>
              <th>Out</th>
              <th>Missed</th>
              <th>AHT</th>
              <th>Utilisation</th>
              <th>Outside SLA</th>
              <th>Avg CSAT</th>
            </tr>
          </thead>
          <tbody id="agent-tbody">
            <tr><td colspan="9"><div class="skel" style="height:40px;margin:8px 0"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Dispositions + Queue -->
    <div class="three-col">
      <div class="card" style="grid-column:span 2">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-o">🏷</div>Top dispositions</div>
        </div>
        <div class="card-body" id="disp-body">
          <div class="skel" style="height:18px;margin-bottom:10px"></div>
          <div class="skel" style="height:18px;margin-bottom:10px"></div>
          <div class="skel" style="height:18px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-t">⏱</div>Queue</div>
        </div>
        <div class="card-body" id="queue-body">
          <div class="skel" style="height:60px;margin-bottom:10px"></div>
          <div class="skel" style="height:60px;margin-bottom:10px"></div>
          <div class="skel" style="height:60px"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="import-bar" id="import-bar">
    <div class="import-dot dot-grey" id="import-dot"></div>
    <span id="import-txt">Checking import status…</span>
  </div>

</div>

<script>
'use strict';

const SESSION_KEY = 'mis_session';

const FLOWS = {
  GET_DAILY: 'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/77251daed25b455abfcfba041f1296db/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=WPspIn90QgRIhc7CiXjNDfjaqRO7hgOUIJK-mXe7aAM',
};

/* ── helpers ── */
function unwrap(d) { return d.body ? (typeof d.body==='string'?JSON.parse(d.body):d.body) : d; }
async function callFlow(url, body={}, attempt=0) {
  try {
    const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) { if (r.status>=500&&attempt<3){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);} throw new Error('Flow HTTP '+r.status); }
    return unwrap(await r.json());
  } catch(e) { if(attempt<3&&!e.message?.startsWith('Flow HTTP')){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);} throw e; }
}
const wait = ms => new Promise(r=>setTimeout(r,ms));
function initials(n){return (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function fmtSec(s){ if(!s&&s!==0) return '—'; const m=Math.floor(s/60),sec=Math.round(s%60); return m?`${m}m ${sec}s`:`${sec}s`; }
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}
function fmtPct(v){if(v===null||v===undefined||v==='')return'—';return parseFloat(v).toFixed(1)+'%';}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}

/* ── state ── */
let S = { session:null, campaign:'NADClinic', date: yesterday(), deptChart: null };

/* ── init ── */
window.addEventListener('DOMContentLoaded', () => {
  const raw = sessionStorage.getItem(SESSION_KEY);
  if (!raw) { window.location.href='../index.html'; return; }
  S.session = JSON.parse(raw);
  const params = new URLSearchParams(window.location.search);
  S.campaign = params.get('campaign') || (S.session.campaigns[0]) || 'NADClinic';
  S.date = params.get('date') || yesterday();

  document.getElementById('date-picker').value = S.date;
  document.getElementById('nav-av').textContent   = initials(S.session.displayName);
  document.getElementById('nav-name').textContent = S.session.displayName.split(' ')[0];
  document.getElementById('hero-campaign').textContent = S.campaign+' · Daily Dashboard';

  document.getElementById('app').style.display = 'block';
  loadData();
});

function onDateChange() {
  S.date = document.getElementById('date-picker').value;
  loadData();
}
function shiftDate(days) {
  const d = new Date(S.date); d.setDate(d.getDate()+days);
  S.date = d.toISOString().split('T')[0];
  document.getElementById('date-picker').value = S.date;
  loadData();
}
function signOut() { sessionStorage.removeItem(SESSION_KEY); window.location.href='../index.html'; }

/* ── load data ── */
async function loadData() {
  document.getElementById('load-txt').textContent = 'Loading dashboard…';
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('hero-sub').textContent = 'Loading…';

  try {
    const raw = await callFlow(FLOWS.GET_DAILY, { campaignCode: S.campaign, reportDate: S.date });
    // Handles both { Table1:[], ... } and { resultsets: { Table1:[], ... } } shapes
    const data = (raw && raw.Table1) ? raw : (raw && raw.resultsets) ? raw.resultsets : raw || {};

    const vol   = (data.Table1||[])[0] || {};
    const sent  =  data.Table2 || [];
    const agts  =  data.Table3 || [];
    const depts =  data.Table4 || [];
    const disp  =  data.Table5 || [];
    const queue = (data.Table6||[])[0] || {};
    const imp   = (data.Table7||[])[0] || {};

    const d = new Date(S.date);
    document.getElementById('hero-sub').textContent =
      d.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    renderKPIs(vol, sent);
    renderSentiment(sent, vol.TotalConvs||0);
    renderAgents(agts);
    renderDepartments(depts);
    renderDispositions(disp);
    renderQueue(queue);
    renderImport(imp);

  } catch(err) {
    document.getElementById('hero-sub').textContent = 'Error loading data';
    document.getElementById('kpi-grid').innerHTML =
      `<div class="kpi-card" style="grid-column:span 4"><div class="empty-state"><div class="empty-ico">⚠️</div><div class="empty-title">Could not load data</div><div class="empty-sub">${err.message}</div></div></div>`;
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

/* ── render KPIs ── */
function renderKPIs(v, sent) {
  const total  = v.TotalConvs  || 0;
  const email  = v.EmailCount  || 0;
  const voice  = v.VoiceCount  || 0;
  const inb    = v.InboundCount|| 0;
  const out    = v.OutboundCount||0;
  const aht    = v.AvgDurationSec ? fmtSec(v.AvgDurationSec) : '—';
  const emailPct = total ? Math.round(email/total*100) : 0;
  const inbPct   = total ? Math.round(inb/total*100)   : 0;
  const pos = (sent.find(s=>s.Sentiment==='Positive')||{}).Count||0;
  const neg = (sent.find(s=>s.Sentiment==='Negative')||{}).Count||0;
  const sentClass = !total ? 'badge-grey' : (neg/total>0.2)?'badge-red':(pos/total>0.6)?'badge-green':'badge-orange';
  const sentLabel = !total ? '—' : (neg/total>0.2)?'Watch':'Good';

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total conversations</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">${email} email · ${voice} voice</div>
      <span class="kpi-badge badge-blue">${emailPct}% email</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Inbound</div>
      <div class="kpi-value">${inb.toLocaleString()}</div>
      <div class="kpi-sub">${out} outbound · ${inbPct}% in</div>
      <span class="kpi-badge badge-green">Inbound split</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg handle time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${aht}</div>
      <div class="kpi-sub">Per conversation</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Sentiment health</div>
      <div class="kpi-value">${pos}</div>
      <div class="kpi-sub">${pos} positive · ${neg} negative</div>
      <span class="kpi-badge ${sentClass}">${sentLabel}</span>
    </div>`;
}

/* ── render Sentiment ── */
function renderSentiment(rows, total) {
  if (!rows.length) {
    document.getElementById('sentiment-body').innerHTML = '<div class="empty-state" style="padding:28px 0"><div class="empty-ico">😐</div><div class="empty-sub">No sentiment data for this date.</div></div>';
    return;
  }
  const colors = { Positive:'#4AFD0E', Neutral:'#f59e0b', Negative:'#c0392b' };
  const order  = ['Positive','Neutral','Negative'];
  const mapped = {};
  rows.forEach(r => mapped[r.Sentiment] = parseInt(r.Count)||0);
  const t = total || rows.reduce((a,r)=>a+(parseInt(r.Count)||0),0) || 1;
  document.getElementById('sentiment-body').innerHTML = order.map(s => {
    const count = mapped[s] || 0;
    const pct   = Math.round(count/t*100);
    return `<div class="sent-row">
      <span class="sent-label" style="color:${colors[s]||'var(--text)'}">${s}</span>
      <div class="sent-bar-wrap"><div class="sent-bar" style="width:${pct}%;background:${colors[s]||'#999'}" data-w="${pct}%"></div></div>
      <span class="sent-count">${count}</span>
      <span class="sent-pct">${pct}%</span>
    </div>`;
  }).join('');
  setTimeout(()=>document.querySelectorAll('.sent-bar[data-w]').forEach(b=>b.style.width=b.dataset.w), 80);
}

/* ── render Departments chart ── */
function renderDepartments(rows) {
  if (S.deptChart) { S.deptChart.destroy(); S.deptChart=null; }
  if (!rows.length) return;
  const labels = rows.map(r=>r.Department);
  const data   = rows.map(r=>parseInt(r.Count)||0);
  const ctx = document.getElementById('dept-chart').getContext('2d');
  S.deptChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets:[{ data, backgroundColor:'#3b82f6', borderRadius:4, borderSkipped:false }]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw} conversations`}} },
      scales:{
        x:{ grid:{color:'#e2e1dd'}, ticks:{font:{family:'Montserrat',size:11}} },
        y:{ grid:{display:false},   ticks:{font:{family:'Montserrat',size:11,weight:'600'}} }
      }
    }
  });
}

/* ── render Agents ── */
function renderAgents(rows) {
  document.getElementById('agent-count').textContent = rows.length + ' agent' + (rows.length!==1?'s':'');
  if (!rows.length) {
    document.getElementById('agent-tbody').innerHTML = `<tr><td colspan="9"><div class="empty-state" style="padding:28px 0"><div class="empty-ico">👤</div><div class="empty-sub">No agent data for this date.</div></div></td></tr>`;
    return;
  }
  document.getElementById('agent-tbody').innerHTML = rows.map(a => {
    const occ   = parseFloat(a.OccupiedPercent)||0;
    const missed = parseInt(a.Missed)||0;
    const sla   = parseInt(a.OutsideSLA)||0;
    const csat  = a.AvgCSAT && parseFloat(a.AvgCSAT)>0 ? parseFloat(a.AvgCSAT).toFixed(1) : '—';
    const missedClass = missed===0?'badge-green':missed<3?'badge-orange':'badge-red';
    const slaClass    = sla===0  ?'badge-green':sla<3   ?'badge-orange':'badge-red';
    return `<tr>
      <td><span class="agent-name">${a.AgentName}</span></td>
      <td><strong>${a.Total||0}</strong></td>
      <td>${a.AnsIn||0}</td>
      <td>${a.AnsOut||0}</td>
      <td><span class="missed-badge ${missedClass}">${missed}</span></td>
      <td>${fmtSec(a.AHTSec)}</td>
      <td>
        <div class="util-bar-wrap"><div class="util-bar" style="width:${Math.min(100,occ)}%"></div></div>
        ${fmtPct(occ)}
      </td>
      <td><span class="missed-badge ${slaClass}">${sla}</span></td>
      <td>${csat}</td>
    </tr>`;
  }).join('');
}

/* ── render Dispositions ── */
function renderDispositions(rows) {
  if (!rows.length) {
    document.getElementById('disp-body').innerHTML = '<div class="empty-state" style="padding:28px 0"><div class="empty-ico">🏷</div><div class="empty-sub">No disposition data for this date.</div></div>';
    return;
  }
  const max = Math.max(...rows.map(r=>parseInt(r.Count)||0));
  document.getElementById('disp-body').innerHTML = rows.map((r,i) => {
    const count = parseInt(r.Count)||0;
    const pct   = max ? Math.round(count/max*100) : 0;
    return `<div class="disp-row">
      <span class="disp-rank">${i+1}</span>
      <span class="disp-name">${r.Disposition||'Unknown'}</span>
      <div class="disp-bar-wrap"><div class="disp-bar" style="width:${pct}%"></div></div>
      <span class="disp-count">${count}</span>
    </div>`;
  }).join('');
}

/* ── render Queue ── */
function renderQueue(q) {
  document.getElementById('queue-body').innerHTML = `
    <div class="queue-stat">
      <div class="qs-val">${parseInt(q.QueueItems)||0}</div>
      <div class="qs-lbl">Queue items</div>
    </div>
    <div class="queue-stat">
      <div class="qs-val">${fmtSec(q.AvgQueueSec)}</div>
      <div class="qs-lbl">Avg wait time</div>
    </div>
    <div class="queue-stat">
      <div class="qs-val">${fmtSec(q.AvgHandleSec)}</div>
      <div class="qs-lbl">Avg handle time</div>
    </div>
    <div class="queue-stat">
      <div class="qs-val">${fmtSec(q.MaxQueueSec)}</div>
      <div class="qs-lbl">Max wait time</div>
    </div>`;
}

/* ── render Import status ── */
function renderImport(imp) {
  const dot  = document.getElementById('import-dot');
  const txt  = document.getElementById('import-txt');
  if (!imp || !imp.Status) { txt.textContent='No import record found.'; dot.className='import-dot dot-orange'; return; }
  const ok = imp.Status==='Success';
  dot.className = 'import-dot '+(ok?'dot-green':'dot-red');
  txt.textContent = `Last import: ${fmtDate(imp.ImportedAt)} · ${imp.Status}`;
}
</script>
