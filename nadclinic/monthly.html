<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilogy · MIS · Monthly Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root{--navy:#1e1e1e;--navy2:#2a2a2a;--green:#4AFD0E;--green-light:#edffd6;--green-dark:#2a8a00;--offwhite:#F7F6F2;--border:#e2e1dd;--border2:#c8c7c3;--surface:#fff;--bg:#e8e7e3;--text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;--radius:8px;--radius-lg:12px;--radius-xl:16px;--red:#c0392b;--orange:#e67e22;--blue:#2980b9}
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;margin:0;overflow-x:hidden}
    *{box-sizing:border-box}
    .nav{background:var(--navy);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100}
    .nav-left{display:flex;align-items:center;gap:12px}
    .nav-divider{width:1px;height:24px;background:rgba(255,255,255,0.15)}
    .nav-section{color:rgba(255,255,255,0.65);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase}
    .nav-back{color:rgba(255,255,255,0.45);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;text-decoration:none;padding:6px 10px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;transition:all 0.15s}
    .nav-back:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid rgba(74,253,14,0.4)}
    .nav-name{color:rgba(255,255,255,0.8);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600}
    .btn-signout{background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.18s}
    .btn-signout:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9)}
    .hero{background:var(--navy);padding:32px 0 28px}
    .hero-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
    .hero-label{color:var(--green);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;margin-bottom:6px}
    .hero-title{color:#fff;font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;line-height:1.15}
    .hero-sub{color:rgba(255,255,255,0.38);font-size:13px;margin-top:4px}
    .month-nav{display:flex;align-items:center;gap:8px}
    .month-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);height:34px;padding:0 14px;border-radius:var(--radius);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;transition:all 0.15s;white-space:nowrap}
    .month-btn:hover{background:rgba(255,255,255,0.14)}
    .month-label{color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);padding:6px 18px;border-radius:var(--radius);min-width:140px;text-align:center}
    .container{max-width:1200px;margin:0 auto;padding:24px 32px 56px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px 22px}
    .kpi-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
    .kpi-value{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;color:var(--text);line-height:1}
    .kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
    .full-card{margin-bottom:20px}
    .two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
    .card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .ci-g{background:var(--green-light)}.ci-b{background:#dbeafe}.ci-o{background:#fef3c7}.ci-p{background:#f3e8ff}.ci-t{background:#ccfbf1}
    .card-body{padding:20px}
    /* leaderboard */
    .lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .lb-row:last-child{border-bottom:none}
    .lb-rank{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;width:24px;text-align:center;flex-shrink:0}
    .lb-rank.gold{color:#f59e0b}.lb-rank.silver{color:#94a3b8}.lb-rank.bronze{color:#b45309}
    .lb-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
    .lb-stats{display:flex;gap:16px;flex-shrink:0}
    .lb-stat{text-align:right}
    .lb-sv{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
    .lb-sl{font-size:10px;color:var(--text3)}
    /* disposition bars */
    .disp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .disp-row:last-child{border-bottom:none}
    .disp-rank{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
    .disp-name{flex:1;font-size:13px;color:var(--text)}
    .disp-bar-wrap{width:80px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
    .disp-bar{height:100%;border-radius:3px;background:var(--blue)}
    .disp-count{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--text);width:36px;text-align:right;flex-shrink:0}
    /* sentiment summary */
    .sent-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .sent-row:last-child{margin-bottom:0}
    .sent-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;width:72px;flex-shrink:0}
    .sent-bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
    .sent-bar{height:100%;border-radius:4px}
    .sent-count{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0}
    .sent-pct{font-size:11px;color:var(--text3);width:36px;flex-shrink:0}
    .import-bar{background:var(--offwhite);border-top:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
    .import-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-green{background:var(--green)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text3);text-align:center}
    .empty-ico{font-size:36px;margin-bottom:12px}
    .empty-sub{font-size:13px}
    #loading-overlay{position:fixed;inset:0;background:rgba(232,231,227,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:14px}
    .load-spinner{width:36px;height:36px;border:3px solid rgba(30,30,30,0.12);border-top-color:var(--navy);border-radius:50%;animation:spin 0.75s linear infinite}
    .load-txt{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .skel{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media(max-width:960px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
    @media(max-width:640px){.nav{padding:0 16px}.hero-inner,.container,.import-bar{padding-left:16px;padding-right:16px}.hero-inner{flex-direction:column;align-items:flex-start}.kpi-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="load-spinner"></div>
  <div class="load-txt">Loading monthly report…</div>
</div>

<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-left">
      <img src="/trilogy-logo.png" alt="Trilogy" style="height:28px">
      <div class="nav-divider"></div>
      <div class="nav-section">MIS Dashboard</div>
      <div class="nav-divider"></div>
      <a class="nav-back" href="../index.html">← Campaigns</a>
    </div>
    <div class="nav-right">
      <div class="nav-avatar" id="nav-av"></div>
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-label" id="hero-campaign">NADClinic · Monthly Report</div>
        <div class="hero-title" id="hero-title">Monthly Report</div>
        <div class="hero-sub" id="hero-sub">Loading…</div>
      </div>
      <div class="month-nav">
        <button class="month-btn" onclick="shiftMonth(-1)">‹ Prev</button>
        <span class="month-label" id="month-label">—</span>
        <button class="month-btn" onclick="shiftMonth(1)">Next ›</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
    </div>

    <div class="card full-card">
      <div class="card-header">
        <div class="card-title"><div class="card-icon ci-b">📈</div>Daily volume this month</div>
      </div>
      <div class="card-body"><div id="volume-chart-wrap"><canvas id="volume-chart" height="160"></canvas></div><div id="volume-chart-empty" class="empty-state" style="display:none"><div class="empty-ico">📊</div><div class="empty-sub">No data for this month.</div></div></div>
    </div>

    <div class="card full-card">
      <div class="card-header">
        <div class="card-title"><div class="card-icon ci-p">🏆</div>Agent leaderboard</div>
        <span id="agent-count" style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--bg);color:var(--text3)">—</span>
      </div>
      <div class="card-body" id="leaderboard-body">
        <div class="skel" style="height:200px"></div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-o">🏷</div>Top dispositions</div>
        </div>
        <div class="card-body" id="disp-body">
          <div class="skel" style="height:160px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-g">😊</div>Sentiment summary</div>
        </div>
        <div class="card-body" id="sentiment-body">
          <div class="skel" style="height:160px"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="import-bar">
    <div class="import-dot" id="import-dot"></div>
    <span id="import-txt">Checking import status…</span>
  </div>
</div>

<script>
'use strict';
const SESSION_KEY='mis_session';
const FLOWS={
  GET_MONTHLY:'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/08addd9f467846bbafcafdf0b39cea49/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=qib_jjQfEn3tRrfjhAegYpfgDOLRD_e3p1ZRgJxSwz4',
};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function unwrap(d){return d.body?(typeof d.body==='string'?JSON.parse(d.body):d.body):d;}
async function callFlow(url,body={},attempt=0){
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){if(r.status>=500&&attempt<3){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw new Error('Flow HTTP '+r.status);}
    return unwrap(await r.json());
  }catch(e){if(attempt<3&&!e.message?.startsWith('Flow HTTP')){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw e;}
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function initials(n){return(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function fmtSec(s){if(!s&&s!==0)return'—';s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${m}m ${sec}s`;if(m>0)return`${m}m ${sec}s`;return`${sec}s`;}
function fmtPct(v){if(v===null||v===undefined||v==='')return'—';return parseFloat(v).toFixed(1)+'%';}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}

let S={session:null,campaign:'NADClinic',year:0,month:0,volChart:null};

window.addEventListener('DOMContentLoaded',()=>{
  const raw=sessionStorage.getItem(SESSION_KEY);
  if(!raw){window.location.href='../index.html';return;}
  S.session=JSON.parse(raw);
  const params=new URLSearchParams(window.location.search);
  S.campaign=params.get('campaign')||(S.session.campaigns[0])||'NADClinic';
  const now=new Date();
  // Default to previous month (data arrives nightly, so last month is always complete)
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  S.year =parseInt(params.get('year') )||prev.getFullYear();
  S.month=parseInt(params.get('month'))||prev.getMonth()+1;
  document.getElementById('nav-av').textContent=initials(S.session.displayName);
  document.getElementById('nav-name').textContent=S.session.displayName.split(' ')[0];
  document.getElementById('hero-campaign').textContent=S.campaign+' · Monthly Report';
  document.getElementById('app').style.display='block';
  updateMonthLabel();
  loadData();
});

function shiftMonth(delta){
  let m=S.month+delta,y=S.year;
  if(m>12){m=1;y++;}else if(m<1){m=12;y--;}
  S.month=m;S.year=y;updateMonthLabel();loadData();
}
function updateMonthLabel(){
  document.getElementById('month-label').textContent=MONTHS[S.month-1]+' '+S.year;
  document.getElementById('hero-title').textContent=MONTHS[S.month-1]+' '+S.year;
  document.getElementById('hero-sub').textContent='Monthly summary for '+S.campaign;
}
function signOut(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html';}

async function loadData(){
  document.getElementById('loading-overlay').style.display='flex';
  try{
    const raw=await callFlow(FLOWS.GET_MONTHLY,{campaignCode:S.campaign,year:S.year,month:S.month});
    const data=(raw&&raw.Table1)?raw:(raw&&raw.resultsets)?raw.resultsets:raw||{};
    const daily  = data.Table1||[];
    const agents = data.Table2||[];
    const depts  = data.Table3||[];
    const totals = (data.Table4||[])[0]||{};
    const disp   = data.Table5||[];
    const imp    = (data.Table6||[])[0]||{};
    renderKPIs(totals,daily);
    renderVolumeChart(daily);
    renderLeaderboard(agents);
    renderDispositions(disp);
    renderSentiment(totals);
    renderImport(imp);
  }catch(err){
    document.getElementById('kpi-grid').innerHTML=`<div class="kpi-card" style="grid-column:span 4"><div class="empty-state"><div class="empty-ico">⚠️</div><div class="empty-sub">${err.message}</div></div></div>`;
  }finally{
    document.getElementById('loading-overlay').style.display='none';
  }
}

function renderKPIs(t,daily){
  const total=parseInt(t.TotalConvs)||0;
  const active=parseInt(t.ActiveDays)||1;
  const avgDay=active?Math.round(total/active):0;
  const inbPct=total?Math.round((parseInt(t.InboundCount)||0)/total*100):0;
  const aht=fmtSec(t.AvgDurationSec);
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card">
      <div class="kpi-label">Total conversations</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">${active} active day${active!==1?'s':''} this month</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Daily average</div>
      <div class="kpi-value">${avgDay.toLocaleString()}</div>
      <div class="kpi-sub">Conversations per active day</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Inbound rate</div>
      <div class="kpi-value">${inbPct}%</div>
      <div class="kpi-sub">${t.InboundCount||0} inbound conversations</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg handle time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${aht}</div>
      <div class="kpi-sub">Per conversation</div>
    </div>`;
}

function renderVolumeChart(daily){
  if(S.volChart){S.volChart.destroy();S.volChart=null;}
  const wrap=document.getElementById('volume-chart-wrap');
  const empty=document.getElementById('volume-chart-empty');
  if(!daily.length){if(wrap)wrap.style.display='none';if(empty)empty.style.display='flex';return;}
  if(wrap)wrap.style.display='block';if(empty)empty.style.display='none';
  const labels=daily.map(d=>new Date(d.ReportDate).getDate().toString());
  const totals=daily.map(d=>parseInt(d.TotalConvs)||0);
  const pos=daily.map(d=>parseInt(d.Positive)||0);
  S.volChart=new Chart(document.getElementById('volume-chart').getContext('2d'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Total',data:totals,borderColor:'#2980b9',backgroundColor:'rgba(41,128,185,0.08)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#2980b9',borderWidth:2},
        {label:'Positive',data:pos,borderColor:'#4AFD0E',backgroundColor:'rgba(74,253,14,0.06)',fill:true,tension:0.3,pointRadius:2,pointBackgroundColor:'#4AFD0E',borderWidth:1.5}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Montserrat',size:11},padding:12}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10}},title:{display:true,text:'Day of month',font:{family:'Montserrat',size:10},color:'var(--text3)'}},
        y:{grid:{color:'#e2e1dd'},ticks:{font:{family:'Montserrat',size:11}},beginAtZero:true}
      }
    }
  });
}

function renderLeaderboard(rows){
  document.getElementById('agent-count').textContent=rows.length+' agent'+(rows.length!==1?'s':'');
  if(!rows.length){document.getElementById('leaderboard-body').innerHTML='<div class="empty-state"><div class="empty-ico">🏆</div><div class="empty-sub">No agent data for this month.</div></div>';return;}
  const rankClass=['gold','silver','bronze'];
  document.getElementById('leaderboard-body').innerHTML=rows.map((a,i)=>{
    const occ=parseFloat(a.AvgOccupied)||0;
    const missed=parseInt(a.Missed)||0;
    const sla=parseInt(a.OutsideSLA)||0;
    const mc=missed===0?'#2a8a00':missed<5?'#92400e':'#c0392b';
    return`<div class="lb-row">
      <span class="lb-rank ${rankClass[i]||''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
      <span class="lb-name">${a.AgentName}</span>
      <div class="lb-stats">
        <div class="lb-stat"><div class="lb-sv">${a.Total||0}</div><div class="lb-sl">Total</div></div>
        <div class="lb-stat"><div class="lb-sv">${fmtSec(a.AvgAHTSec)}</div><div class="lb-sl">Avg AHT</div></div>
        <div class="lb-stat"><div class="lb-sv" style="color:${mc}">${missed}</div><div class="lb-sl">Missed</div></div>
        <div class="lb-stat"><div class="lb-sv">${fmtPct(occ)}</div><div class="lb-sl">Util.</div></div>
        <div class="lb-stat"><div class="lb-sv">${a.DaysAttendance||0}</div><div class="lb-sl">Days</div></div>
        <div class="lb-stat"><div class="lb-sv" style="color:${sla===0?'#2a8a00':'#c0392b'}">${sla}</div><div class="lb-sl">SLA</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderDispositions(rows){
  if(!rows.length){document.getElementById('disp-body').innerHTML='<div class="empty-state" style="padding:28px 0"><div class="empty-ico">🏷</div><div class="empty-sub">No disposition data.</div></div>';return;}
  const max=Math.max(...rows.map(r=>parseInt(r.Count)||0));
  document.getElementById('disp-body').innerHTML=rows.map((r,i)=>{
    const count=parseInt(r.Count)||0,pct=max?Math.round(count/max*100):0;
    return`<div class="disp-row"><span class="disp-rank">${i+1}</span><span class="disp-name">${r.Disposition||'Unknown'}</span><div class="disp-bar-wrap"><div class="disp-bar" style="width:${pct}%"></div></div><span class="disp-count">${count}</span></div>`;
  }).join('');
}

function renderSentiment(t){
  const pos=parseInt(t.Positive)||0,neg=parseInt(t.Negative)||0;
  const total=parseInt(t.TotalConvs)||1;
  const neu=total-pos-neg;
  const rows=[['Positive',pos,'#4AFD0E'],['Neutral',Math.max(0,neu),'#f59e0b'],['Negative',neg,'#c0392b']];
  document.getElementById('sentiment-body').innerHTML=rows.map(([l,v,c])=>{
    const pct=Math.round(v/total*100);
    return`<div class="sent-row"><span class="sent-label" style="color:${c}">${l}</span><div class="sent-bar-wrap"><div class="sent-bar" style="width:${pct}%;background:${c}"></div></div><span class="sent-count">${v}</span><span class="sent-pct">${pct}%</span></div>`;
  }).join('');
  setTimeout(()=>document.querySelectorAll('.sent-bar').forEach(b=>{const w=b.style.width;b.style.width='0';requestAnimationFrame(()=>b.style.transition='width 0.8s ease',b.style.width=w);}),80);
}

function renderImport(imp){
  if(!imp||!imp.Status){document.getElementById('import-txt').textContent='No import record found.';document.getElementById('import-dot').className='import-dot dot-orange';return;}
  document.getElementById('import-dot').className='import-dot '+(imp.Status==='Success'?'dot-green':'dot-red');
  document.getElementById('import-txt').textContent=`Last import: ${fmtDate(imp.ImportedAt)} · ${imp.Status}`;
}
</script>
</body>
</html>
