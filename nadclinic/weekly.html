<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilogy · MIS · Weekly Trends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --navy:#1e1e1e;--navy2:#2a2a2a;--green:#4AFD0E;--green-light:#edffd6;
      --green-dark:#2a8a00;--offwhite:#F7F6F2;--border:#e2e1dd;--border2:#c8c7c3;
      --surface:#fff;--bg:#e8e7e3;--text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;
      --radius:8px;--radius-lg:12px;--radius-xl:16px;
      --red:#c0392b;--orange:#e67e22;--blue:#2980b9;
    }
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;margin:0;overflow-x:hidden}
    *{box-sizing:border-box}
    .nav{background:var(--navy);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100}
    .nav-left{display:flex;align-items:center;gap:12px}
    .nav-divider{width:1px;height:24px;background:rgba(255,255,255,0.15)}
    .nav-section{color:rgba(255,255,255,0.65);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase}
    .nav-back{color:rgba(255,255,255,0.45);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;text-decoration:none;padding:6px 10px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;transition:all 0.15s}
    .nav-back:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid rgba(74,253,14,0.4)}
    .nav-name{color:rgba(255,255,255,0.8);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600}
    .btn-signout{background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all 0.18s}
    .btn-signout:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9)}
    .hero{background:var(--navy);padding:32px 0 28px}
    .hero-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
    .hero-label{color:var(--green);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;margin-bottom:6px}
    .hero-title{color:#fff;font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;line-height:1.15}
    .hero-sub{color:rgba(255,255,255,0.38);font-size:13px;margin-top:4px}
    .week-nav{display:flex;align-items:center;gap:8px}
    .week-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);height:34px;padding:0 14px;border-radius:var(--radius);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;transition:all 0.15s;white-space:nowrap}
    .week-btn:hover{background:rgba(255,255,255,0.14)}
    .week-label{color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);padding:6px 14px;border-radius:var(--radius)}
    .container{max-width:1200px;margin:0 auto;padding:24px 32px 56px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px 22px}
    .kpi-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
    .kpi-value{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;color:var(--text);line-height:1}
    .kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
    .card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .ci-g{background:var(--green-light)}.ci-b{background:#dbeafe}.ci-o{background:#fef3c7}.ci-p{background:#f3e8ff}
    .card-body{padding:20px}
    .agent-table-wrap{overflow-x:auto}
    .agent-table{width:100%;border-collapse:collapse;font-size:12px}
    .agent-table th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
    .agent-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    .agent-table tr:last-child td{border-bottom:none}
    .agent-table tr:hover td{background:var(--offwhite)}
    .agent-name{font-weight:600;font-size:13px}
    .badge{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
    .badge-green{background:var(--green-light);color:var(--green-dark)}
    .badge-orange{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:var(--red)}
    .badge-grey{background:var(--bg);color:var(--text3)}
    .util-bar-wrap{width:60px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
    .util-bar{height:100%;border-radius:3px;background:var(--green)}
    .import-bar{background:var(--offwhite);border-top:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
    .import-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-green{background:var(--green)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text3);text-align:center}
    .empty-ico{font-size:36px;margin-bottom:12px}
    .empty-sub{font-size:13px}
    #loading-overlay{position:fixed;inset:0;background:rgba(232,231,227,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:14px}
    .load-spinner{width:36px;height:36px;border:3px solid rgba(30,30,30,0.12);border-top-color:var(--navy);border-radius:50%;animation:spin 0.75s linear infinite}
    .load-txt{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .skel{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media(max-width:960px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
    @media(max-width:640px){.nav{padding:0 16px}.hero-inner,.container,.import-bar{padding-left:16px;padding-right:16px}.hero-inner{flex-direction:column;align-items:flex-start}.kpi-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="load-spinner"></div>
  <div class="load-txt" id="load-txt">Loading weekly data…</div>
</div>

<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-left">
      <img src="/trilogy-logo.png" alt="Trilogy" style="height:28px">
      <div class="nav-divider"></div>
      <div class="nav-section">MIS Dashboard</div>
      <div class="nav-divider"></div>
      <a class="nav-back" href="../index.html">← Campaigns</a>
    </div>
    <div class="nav-right">
      <div class="nav-avatar" id="nav-av"></div>
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-label" id="hero-campaign">NADClinic · Weekly Trends</div>
        <div class="hero-title">Weekly Report</div>
        <div class="hero-sub" id="hero-sub">Loading…</div>
      </div>
      <div class="week-nav">
        <button class="week-btn" onclick="shiftWeek(-7)">‹ Prev week</button>
        <span class="week-label" id="week-label">—</span>
        <button class="week-btn" onclick="shiftWeek(7)">Next week ›</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-b">📈</div>Daily volume</div>
        </div>
        <div class="card-body"><canvas id="volume-chart" height="200"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="card-icon ci-g">😊</div>Sentiment by day</div>
        </div>
        <div class="card-body"><canvas id="sentiment-chart" height="200"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title"><div class="card-icon ci-p">👤</div>Agent weekly totals</div>
        <span id="agent-count" style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--bg);color:var(--text3)">—</span>
      </div>
      <div class="agent-table-wrap">
        <table class="agent-table">
          <thead>
            <tr>
              <th>Agent</th>
              <th>Total</th>
              <th>Answered</th>
              <th>Missed</th>
              <th>Avg AHT</th>
              <th>Avg Util.</th>
              <th>Outside SLA</th>
            </tr>
          </thead>
          <tbody id="agent-tbody">
            <tr><td colspan="7"><div class="skel" style="height:40px;margin:8px 0"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="import-bar">
    <div class="import-dot" id="import-dot"></div>
    <span id="import-txt">Checking import status…</span>
  </div>
</div>

<script>
'use strict';
const SESSION_KEY = 'mis_session';
const FLOWS = {
  GET_WEEKLY: 'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/b6d70af004bf4a658a294a5e23a6f2b8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LD-7VDdJcAIAgLqzhegGpK_tBxBOAJcmzfPKObbK7ME',
};

function unwrap(d){return d.body?(typeof d.body==='string'?JSON.parse(d.body):d.body):d;}
async function callFlow(url,body={},attempt=0){
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){if(r.status>=500&&attempt<3){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw new Error('Flow HTTP '+r.status);}
    return unwrap(await r.json());
  }catch(e){if(attempt<3&&!e.message?.startsWith('Flow HTTP')){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw e;}
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function initials(n){return(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function localDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return localDate(d);}
function fmtSec(s){if(!s&&s!==0)return'—';s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${m}m ${sec}s`;if(m>0)return`${m}m ${sec}s`;return`${sec}s`;}
function fmtPct(v){if(v===null||v===undefined||v==='')return'—';return parseFloat(v).toFixed(1)+'%';}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}
function dayLabel(iso){return new Date(iso).toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'});}

let S={session:null,campaign:'NADClinic',weekEnd:yesterday(),volChart:null,sentChart:null};

window.addEventListener('DOMContentLoaded',()=>{
  const raw=sessionStorage.getItem(SESSION_KEY);
  if(!raw){window.location.href='../index.html';return;}
  S.session=JSON.parse(raw);
  const params=new URLSearchParams(window.location.search);
  S.campaign=params.get('campaign')||(S.session.campaigns[0])||'NADClinic';
  S.weekEnd=params.get('weekEnd')||yesterday();
  document.getElementById('nav-av').textContent=initials(S.session.displayName);
  document.getElementById('nav-name').textContent=S.session.displayName.split(' ')[0];
  document.getElementById('hero-campaign').textContent=S.campaign+' · Weekly Trends';
  document.getElementById('app').style.display='block';
  updateWeekLabel();
  loadData();
});

function shiftWeek(days){
  const d=new Date(S.weekEnd);d.setDate(d.getDate()+days);
  S.weekEnd=localDate(d);updateWeekLabel();loadData();
}
function updateWeekLabel(){
  const end=new Date(S.weekEnd),start=new Date(S.weekEnd);
  start.setDate(start.getDate()-6);
  const fmt=d=>d.toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
  document.getElementById('week-label').textContent=fmt(start)+' – '+fmt(end);
  document.getElementById('hero-sub').textContent='7 days ending '+end.toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'});
}
function signOut(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html';}

async function loadData(){
  document.getElementById('loading-overlay').style.display='flex';
  try{
    const raw=await callFlow(FLOWS.GET_WEEKLY,{campaignCode:S.campaign,weekEnd:S.weekEnd});
    const data=(raw&&raw.Table1)?raw:(raw&&raw.resultsets)?raw.resultsets:raw||{};
    const daily  = data.Table1||[];
    const sentD  = data.Table2||[];
    const agents = data.Table3||[];
    const totals = (data.Table4||[])[0]||{};
    const imp    = (data.Table5||[])[0]||{};

    renderKPIs(totals,daily);
    renderVolumeChart(daily);
    renderSentimentChart(daily,sentD);
    renderAgents(agents);
    renderImport(imp);
  }catch(err){
    document.getElementById('hero-sub').textContent='Error loading data';
    document.getElementById('kpi-grid').innerHTML=`<div class="kpi-card" style="grid-column:span 4"><div class="empty-state"><div class="empty-ico">⚠️</div><div class="empty-sub">${err.message}</div></div></div>`;
  }finally{
    document.getElementById('loading-overlay').style.display='none';
  }
}

function renderKPIs(t,daily){
  const total=parseInt(t.TotalConvs)||0;
  const avgDay=daily.length?Math.round(total/daily.length):0;
  const inbPct=total?Math.round((parseInt(t.InboundCount)||0)/total*100):0;
  const aht=fmtSec(t.AvgDurationSec);
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card">
      <div class="kpi-label">Total conversations</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">Over ${daily.length} day${daily.length!==1?'s':''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Daily average</div>
      <div class="kpi-value">${avgDay.toLocaleString()}</div>
      <div class="kpi-sub">Conversations per day</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Inbound rate</div>
      <div class="kpi-value">${inbPct}%</div>
      <div class="kpi-sub">${t.InboundCount||0} inbound total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg handle time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${aht}</div>
      <div class="kpi-sub">Per conversation</div>
    </div>`;
}

function renderVolumeChart(daily){
  if(S.volChart){S.volChart.destroy();S.volChart=null;}
  if(!daily.length){document.getElementById('volume-chart').parentElement.innerHTML='<div class="empty-state"><div class="empty-ico">📊</div><div class="empty-sub">No volume data for this period.</div></div>';return;}
  const labels=daily.map(d=>dayLabel(d.ReportDate));
  const totals=daily.map(d=>parseInt(d.TotalConvs)||0);
  const emails=daily.map(d=>parseInt(d.EmailCount)||0);
  S.volChart=new Chart(document.getElementById('volume-chart').getContext('2d'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Total',data:totals,backgroundColor:'rgba(41,128,185,0.15)',borderColor:'#2980b9',borderWidth:2,borderRadius:4,type:'line',fill:true,tension:0.3,pointBackgroundColor:'#2980b9',pointRadius:4},
        {label:'Email',data:emails,backgroundColor:'rgba(74,253,14,0.25)',borderColor:'#4AFD0E',borderWidth:1,borderRadius:4}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Montserrat',size:11},padding:12}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10}}},
        y:{grid:{color:'#e2e1dd'},ticks:{font:{family:'Montserrat',size:11}},beginAtZero:true}
      }
    }
  });
}

function renderSentimentChart(daily,sentRows){
  if(S.sentChart){S.sentChart.destroy();S.sentChart=null;}
  if(!daily.length){return;}
  const labels=daily.map(d=>dayLabel(d.ReportDate));
  const dates=daily.map(d=>d.ReportDate);
  const byDate={};
  sentRows.forEach(r=>{
    if(!byDate[r.ReportDate])byDate[r.ReportDate]={Positive:0,Neutral:0,Negative:0};
    byDate[r.ReportDate][r.Sentiment]=(parseInt(r.Count)||0);
  });
  S.sentChart=new Chart(document.getElementById('sentiment-chart').getContext('2d'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Positive',data:dates.map(d=>(byDate[d]||{}).Positive||0),backgroundColor:'rgba(74,253,14,0.7)',borderRadius:{topLeft:4,topRight:4}},
        {label:'Neutral', data:dates.map(d=>(byDate[d]||{}).Neutral||0), backgroundColor:'rgba(245,158,11,0.7)'},
        {label:'Negative',data:dates.map(d=>(byDate[d]||{}).Negative||0),backgroundColor:'rgba(192,57,43,0.7)',borderRadius:{bottomLeft:4,bottomRight:4}}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Montserrat',size:11},padding:12}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10}},stacked:true},
        y:{grid:{color:'#e2e1dd'},ticks:{font:{family:'Montserrat',size:11}},stacked:true,beginAtZero:true}
      }
    }
  });
}

function renderAgents(rows){
  document.getElementById('agent-count').textContent=rows.length+' agent'+(rows.length!==1?'s':'');
  if(!rows.length){
    document.getElementById('agent-tbody').innerHTML=`<tr><td colspan="7"><div class="empty-state" style="padding:28px 0"><div class="empty-ico">👤</div><div class="empty-sub">No agent data for this period.</div></div></td></tr>`;
    return;
  }
  document.getElementById('agent-tbody').innerHTML=rows.map(a=>{
    const occ=parseFloat(a.AvgOccupied)||0;
    const missed=parseInt(a.Missed)||0;
    const sla=parseInt(a.OutsideSLA)||0;
    const mc=missed===0?'badge-green':missed<5?'badge-orange':'badge-red';
    const sc=sla===0?'badge-green':sla<5?'badge-orange':'badge-red';
    return`<tr>
      <td><span class="agent-name">${a.AgentName}</span></td>
      <td><strong>${a.Total||0}</strong></td>
      <td>${a.Answered||0}</td>
      <td><span class="badge ${mc}">${missed}</span></td>
      <td>${fmtSec(a.AvgAHTSec)}</td>
      <td>
        <div class="util-bar-wrap"><div class="util-bar" style="width:${Math.min(100,occ)}%"></div></div>
        ${fmtPct(occ)}
      </td>
      <td><span class="badge ${sc}">${sla}</span></td>
    </tr>`;
  }).join('');
}

function renderImport(imp){
  if(!imp||!imp.Status){document.getElementById('import-txt').textContent='No import record found.';document.getElementById('import-dot').className='import-dot dot-orange';return;}
  document.getElementById('import-dot').className='import-dot '+(imp.Status==='Success'?'dot-green':'dot-red');
  document.getElementById('import-txt').textContent=`Last import: ${fmtDate(imp.ImportedAt)} · ${imp.Status}`;
}
</script>
</body>
</html>
