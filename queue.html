<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilogy · MIS · Queue Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root{--navy:#1e1e1e;--navy2:#2a2a2a;--green:#4AFD0E;--green-light:#edffd6;--green-dark:#2a8a00;--offwhite:#F7F6F2;--border:#e2e1dd;--border2:#c8c7c3;--surface:#fff;--bg:#e8e7e3;--text:#1B2A4A;--text2:#4A5568;--text3:#7a8499;--radius:8px;--radius-lg:12px;--radius-xl:16px;--red:#c0392b;--orange:#e67e22;--blue:#2980b9}
    html{scroll-behavior:smooth;overflow-x:hidden}body{font-family:'Wix Madefor Text',sans-serif;background:var(--bg);color:var(--text);font-size:14px;margin:0}*{box-sizing:border-box}
    .nav{background:var(--navy);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100}
    .nav-left{display:flex;align-items:center;gap:12px}.nav-divider{width:1px;height:24px;background:rgba(255,255,255,0.15)}
    .nav-section{color:rgba(255,255,255,.65);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase}
    .nav-back{color:rgba(255,255,255,.45);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;text-decoration:none;padding:6px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;transition:all .15s}
    .nav-back:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:var(--navy);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid rgba(74,253,14,.4)}
    .nav-name{color:rgba(255,255,255,.8);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600}
    .btn-signout{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .18s}
    .btn-signout:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
    .tab-nav{background:var(--offwhite);border-bottom:1px solid var(--border)}
    .tab-nav-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;gap:2px}
    .tab-link{padding:11px 16px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
    .tab-link:hover{color:var(--text)}.tab-link.active{color:var(--text);border-bottom-color:var(--green)}
    .hero{background:var(--navy);padding:32px 0 28px}
    .hero-inner{max-width:1200px;margin:0 auto;padding:0 32px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
    .hero-label{color:var(--green);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;margin-bottom:6px}
    .hero-title{color:#fff;font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;line-height:1.15}
    .hero-sub{color:rgba(255,255,255,.38);font-size:13px;margin-top:4px}
    .range-nav{display:flex;align-items:center;gap:8px}
    .range-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);height:34px;padding:0 12px;border-radius:var(--radius);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;transition:all .15s}
    .range-btn:hover{background:rgba(255,255,255,.14)}.range-btn.active-range{background:rgba(74,253,14,.15);border-color:rgba(74,253,14,.4);color:var(--green)}
    .container{max-width:1200px;margin:0 auto;padding:24px 32px 56px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px 22px}
    .kpi-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
    .kpi-value{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;color:var(--text);line-height:1}
    .kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
    .kpi-badge{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px}
    .badge-green{background:var(--green-light);color:var(--green-dark)}.badge-orange{background:#fef3c7;color:#92400e}.badge-red{background:#fee2e2;color:var(--red)}.badge-grey{background:var(--bg);color:var(--text3)}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;margin-bottom:20px}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .card-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
    .card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .ci-g{background:var(--green-light)}.ci-b{background:#dbeafe}.ci-t{background:#ccfbf1}.ci-o{background:#fef3c7}
    .card-body{padding:20px}
    /* QUEUE TABLE */
    .q-table{width:100%;border-collapse:collapse;font-size:12px}
    .q-table th{text-align:left;padding:8px 14px;border-bottom:1px solid var(--border);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
    .q-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
    .q-table tr:last-child td{border-bottom:none}
    .q-table tr:hover td{background:var(--offwhite)}
    .answer-bar-wrap{width:80px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
    .answer-bar{height:100%;border-radius:3px;background:var(--green)}
    /* EMPTY/LOADING */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text3);text-align:center}
    .empty-ico{font-size:36px;margin-bottom:12px}.empty-sub{font-size:13px}
    #loading-overlay{position:fixed;inset:0;background:rgba(232,231,227,.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:14px}
    .load-spinner{width:36px;height:36px;border:3px solid rgba(30,30,30,.12);border-top-color:var(--navy);border-radius:50%;animation:spin .75s linear infinite}
    .load-txt{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .skel{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .import-bar{background:var(--offwhite);border-top:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
    .import-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-green{background:var(--green)}.dot-orange{background:var(--orange)}.dot-red{background:var(--red)}
    @media(max-width:960px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
    @media(max-width:640px){.nav{padding:0 16px}.hero-inner,.container,.import-bar{padding-left:16px;padding-right:16px}.hero-inner{flex-direction:column;align-items:flex-start}.kpi-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div id="loading-overlay"><div class="load-spinner"></div><div class="load-txt">Loading queue data…</div></div>

<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-left">
      <img src="/trilogy-logo.png" alt="Trilogy" style="height:28px">
      <div class="nav-divider"></div>
      <div class="nav-section">MIS Dashboard</div>
      <div class="nav-divider"></div>
      <a class="nav-back" href="../index.html">← Campaigns</a>
    </div>
    <div class="nav-right">
      <div class="nav-avatar" id="nav-av"></div>
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <div class="tab-nav"><div id="tab-nav-inner" class="tab-nav-inner"></div></div>

  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-label" id="hero-campaign">NADClinic · Queue Analysis</div>
        <div class="hero-title">Queue Analysis</div>
        <div class="hero-sub" id="hero-sub">Loading…</div>
      </div>
      <div class="range-nav">
        <button class="range-btn active-range" onclick="setRange(7,this)">7 days</button>
        <button class="range-btn" onclick="setRange(14,this)">14 days</button>
        <button class="range-btn" onclick="setRange(30,this)">30 days</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
      <div class="kpi-card"><div class="skel" style="height:20px;margin-bottom:8px;width:80px"></div><div class="skel" style="height:36px;width:60px"></div></div>
    </div>

    <div class="two-col">
      <div class="card" style="margin-bottom:0">
        <div class="card-header"><div class="card-title"><div class="card-icon ci-b">📈</div>Daily volume & wait time</div></div>
        <div class="card-body"><canvas id="trend-chart" height="200"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-header"><div class="card-title"><div class="card-icon ci-o">🕐</div>Volume by hour of day</div></div>
        <div class="card-body"><canvas id="hour-chart" height="200"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-top:20px">
      <div class="card-header">
        <div class="card-title"><div class="card-icon ci-t">⏱</div>Queue breakdown</div>
        <span id="queue-count" style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--bg);color:var(--text3)">—</span>
      </div>
      <div id="queue-table-wrap">
        <div class="skel" style="height:80px;margin:16px"></div>
      </div>
    </div>
  </div>

  <div class="import-bar">
    <div class="import-dot" id="import-dot"></div>
    <span id="import-txt">Checking import status…</span>
  </div>
</div>

<script>
'use strict';
const SESSION_KEY='mis_session';
const FLOWS={GET_QUEUE:'https://default77cde95f930f495e89c64d2c30f6df.21.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/69df2d88cca644108d8b4980777d7d0d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XpgmWqG0WzgUQrVnWvI3h-15leslaRLWsrpffepE9_M'};

function unwrap(d){return d.body?(typeof d.body==='string'?JSON.parse(d.body):d.body):d;}
async function callFlow(url,body={},attempt=0){
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){if(r.status>=500&&attempt<3){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw new Error('Flow HTTP '+r.status);}
  return unwrap(await r.json());}
  catch(e){if(attempt<3&&!e.message?.startsWith('Flow HTTP')){await wait(1200*(attempt+1));return callFlow(url,body,attempt+1);}throw e;}
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function initials(n){return(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function localDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
function fmtSec(s){if(!s&&s!==0)return'—';s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${m}m`;if(m>0)return`${m}m ${sec}s`;return`${sec}s`;}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}
function parseIso(v){if(!v)return null;if(typeof v==='string'){const d=v.match(/\/Date\((\d+)/);if(d)return new Date(parseInt(d[1]));return new Date(v);}return new Date(v);}

let S={session:null,campaign:'NADClinic',days:7,trendChart:null,hourChart:null};

window.addEventListener('DOMContentLoaded',()=>{
  const raw=sessionStorage.getItem(SESSION_KEY);
  if(!raw){window.location.href='../index.html';return;}
  S.session=JSON.parse(raw);
  const params=new URLSearchParams(window.location.search);
  S.campaign=params.get('campaign')||(S.session.campaigns[0])||'NADClinic';
  document.getElementById('nav-av').textContent=initials(S.session.displayName);
  document.getElementById('nav-name').textContent=S.session.displayName.split(' ')[0];
  document.getElementById('hero-campaign').textContent=S.campaign+' · Queue Analysis';
  document.getElementById('app').style.display='block';
  setTabNav('queue');
  loadData();
});

function setTabNav(active){
  const c=encodeURIComponent(S.campaign);
  document.getElementById('tab-nav-inner').innerHTML=[
    ['daily','📊 Daily',`daily.html?campaign=${c}`],
    ['weekly','📈 Weekly',`weekly.html?campaign=${c}`],
    ['monthly','📅 Monthly',`monthly.html?campaign=${c}`],
    ['agents','👤 Agents',`agents.html?campaign=${c}`],
    ['queue','⏱ Queue',`queue.html?campaign=${c}`],
  ].map(([id,lbl,href])=>`<a class="tab-link${id===active?' active':''}" href="${href}">${lbl}</a>`).join('');
}

function setRange(days,btn){
  S.days=days;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active-range'));
  btn.classList.add('active-range');
  loadData();
}

function getDateRange(){
  const to=new Date();to.setDate(to.getDate()-1);
  const from=new Date(to);from.setDate(from.getDate()-(S.days-1));
  return{dateFrom:localDate(from),dateTo:localDate(to)};
}

function signOut(){sessionStorage.removeItem(SESSION_KEY);window.location.href='../index.html';}

async function loadData(){
  document.getElementById('loading-overlay').style.display='flex';
  const{dateFrom,dateTo}=getDateRange();
  document.getElementById('hero-sub').textContent=`${S.days} days · ${new Date(dateFrom).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})} – ${new Date(dateTo).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})}`;
  try{
    const raw=await callFlow(FLOWS.GET_QUEUE,{campaignCode:S.campaign,dateFrom,dateTo});
    const data=(raw&&raw.Table1)?raw:(raw&&raw.resultsets)?raw.resultsets:raw||{};
    const totals=(data.Table1||[])[0]||{};
    const daily =data.Table2||[];
    const queues=data.Table3||[];
    const hours =data.Table4||[];
    const imp   =(data.Table5||[])[0]||{};
    renderKPIs(totals);
    renderTrendChart(daily);
    renderHourChart(hours);
    renderQueueTable(queues);
    renderImport(imp);
  }catch(err){
    document.getElementById('kpi-grid').innerHTML=`<div class="kpi-card" style="grid-column:span 4"><div class="empty-state"><div class="empty-ico">⚠️</div><div class="empty-sub">${err.message}</div></div></div>`;
  }finally{
    document.getElementById('loading-overlay').style.display='none';
  }
}

function renderKPIs(t){
  const offered=parseInt(t.TotalOffered)||0;
  const answered=parseInt(t.TotalAnswered)||0;
  const abandoned=parseInt(t.TotalAbandoned)||0;
  const ansRate=offered?Math.round(answered/offered*100):0;
  const ansClass=ansRate>=90?'badge-green':ansRate>=75?'badge-orange':'badge-red';
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card">
      <div class="kpi-label">Total offered</div>
      <div class="kpi-value">${offered.toLocaleString()}</div>
      <div class="kpi-sub">${answered} answered · ${abandoned} abandoned</div>
      <span class="kpi-badge ${ansClass}">${ansRate}% answer rate</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg wait time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${fmtSec(t.AvgWaitSec)}</div>
      <div class="kpi-sub">Max wait: ${fmtSec(t.MaxWaitSec)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg handle time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${fmtSec(t.AvgHandleSec)}</div>
      <div class="kpi-sub">For answered calls</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg ring time</div>
      <div class="kpi-value" style="font-size:22px;margin-top:4px">${fmtSec(t.AvgRingSec)}</div>
      <div class="kpi-sub">Before answer or abandon</div>
    </div>`;
}

function renderTrendChart(daily){
  if(S.trendChart){S.trendChart.destroy();S.trendChart=null;}
  if(!daily.length)return;
  const labels=daily.map(d=>{const dt=parseIso(d.ReportDate);return dt&&!isNaN(dt)?dt.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short'}):d.ReportDate;});
  S.trendChart=new Chart(document.getElementById('trend-chart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Answered',data:daily.map(d=>parseInt(d.TotalAnswered)||0),backgroundColor:'rgba(74,253,14,.4)',borderColor:'#4AFD0E',borderWidth:1,borderRadius:3,order:2},
      {label:'Abandoned',data:daily.map(d=>parseInt(d.TotalAbandoned)||0),backgroundColor:'rgba(192,57,43,.4)',borderColor:'#c0392b',borderWidth:1,borderRadius:3,order:2},
      {label:'Avg wait (s)',data:daily.map(d=>Math.round(parseFloat(d.AvgWaitSec)||0)),type:'line',borderColor:'#2980b9',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:'#2980b9',yAxisID:'y2',order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Montserrat',size:11},padding:12}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10}},stacked:true},
        y:{grid:{color:'#e2e1dd'},ticks:{font:{family:'Montserrat',size:11}},stacked:true,beginAtZero:true},
        y2:{position:'right',grid:{display:false},ticks:{font:{family:'Montserrat',size:10}},title:{display:true,text:'Avg wait (s)',font:{family:'Montserrat',size:10}}}
      }}
  });
}

function renderHourChart(hours){
  if(S.hourChart){S.hourChart.destroy();S.hourChart=null;}
  if(!hours.length)return;
  const allHours=Array.from({length:24},(_,i)=>i);
  const byHour={};hours.forEach(h=>{byHour[parseInt(h.HourOfDay)]={offered:parseInt(h.TotalOffered)||0,answered:parseInt(h.TotalAnswered)||0};});
  const fmt=h=>h===0?'12am':h<12?`${h}am`:h===12?'12pm':`${h-12}pm`;
  S.hourChart=new Chart(document.getElementById('hour-chart').getContext('2d'),{
    type:'bar',
    data:{
      labels:allHours.map(fmt),
      datasets:[
        {label:'Answered',data:allHours.map(h=>(byHour[h]||{}).answered||0),backgroundColor:'rgba(74,253,14,.5)',borderRadius:2},
        {label:'Abandoned',data:allHours.map(h=>((byHour[h]||{}).offered||0)-((byHour[h]||{}).answered||0)),backgroundColor:'rgba(192,57,43,.4)',borderRadius:2}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Montserrat',size:11},padding:10}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:9},maxRotation:45},stacked:true},
        y:{grid:{color:'#e2e1dd'},ticks:{font:{family:'Montserrat',size:10}},stacked:true,beginAtZero:true}
      }}
  });
}

function renderQueueTable(queues){
  document.getElementById('queue-count').textContent=queues.length+' queue'+(queues.length!==1?'s':'');
  if(!queues.length){
    document.getElementById('queue-table-wrap').innerHTML='<div class="empty-state"><div class="empty-ico">⏱</div><div class="empty-sub">No queue data for this period.</div></div>';
    return;
  }
  document.getElementById('queue-table-wrap').innerHTML=`
    <table class="q-table">
      <thead><tr>
        <th>Queue</th><th>Offered</th><th>Answered</th><th>Answer rate</th><th>Avg wait</th><th>Max wait</th>
      </tr></thead>
      <tbody>${queues.map(q=>{
        const rate=parseFloat(q.AnswerRate)||0;
        const rateClass=rate>=90?'badge-green':rate>=75?'badge-orange':'badge-red';
        return`<tr>
          <td style="font-weight:600">${q.QueueName||'Unknown'}</td>
          <td>${parseInt(q.TotalOffered)||0}</td>
          <td>${parseInt(q.TotalAnswered)||0}</td>
          <td>
            <div class="answer-bar-wrap"><div class="answer-bar" style="width:${rate}%"></div></div>
            <span class="kpi-badge ${rateClass}" style="font-size:10px">${rate.toFixed(1)}%</span>
          </td>
          <td>${fmtSec(q.AvgWaitSec)}</td>
          <td>${fmtSec(q.MaxWaitSec)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function renderImport(imp){
  if(!imp||!imp.Status){document.getElementById('import-txt').textContent='No import record found.';document.getElementById('import-dot').className='import-dot dot-orange';return;}
  document.getElementById('import-dot').className='import-dot '+(imp.Status==='Success'?'dot-green':'dot-red');
  document.getElementById('import-txt').textContent=`Last import: ${fmtDate(imp.ImportedAt)} · ${imp.Status}`;
}
</script>
</body>
</html>
